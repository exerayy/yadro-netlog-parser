services:

  app:
    image: app:latest
    build:
      dockerfile: Dockerfile
    container_name: app
    restart: unless-stopped
    ports:
      - 8080:8080
    volumes:
      - ./config.yaml:/config.yaml
      - ./data:/app/data
    environment:
      - LOG_LEVEL=DEBUG
      - PORT=8080
      - TIMEOUT=5s
      - DATABASE_URL=postgres://postgres:password@db:5432/postgres
      - DATA_DIR=data
    depends_on:
      - db


  db:
    image: postgres:18
    container_name: db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD", "pg_isready --username=postgres" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

volumes:
  db:
